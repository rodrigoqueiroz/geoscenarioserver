name: Test Conda Package

on:
  pull_request:

jobs:
  test-conda-package:
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: true

      - name: Run conda package test script
        run: bash test/test_conda_package.bash
