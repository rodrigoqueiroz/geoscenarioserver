name: gss
channels:
  - robostack-humble
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - tk=*=xft_* # use the TrueType variant
  - antlr4-python3-runtime>=4.13
  - graphviz
  - matplotlib
  - numpy
  - scipy
  - requests
  - pynput
  - screeninfo
  - jq
  - pydot
  - sysv_ipc
  - ros-humble-lanelet2
  - ros-humble-py-trees>=2.2
  # Removed antlr-denter - now vendored in geoscenarioserver/util/DenterHelper.py
    
